	async function sine() {
		// 1. Initialize the audio environment
		const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
		
		// 2. Create the tone generator
		const oscillator = audioCtx.createOscillator();
		const lfo = audioCtx.createOscillator();
		const lfo2 = audioCtx.createOscillator();
		
		// 3. Set the waveform shape to a sine wave
		oscillator.type = 'sine';
		lfo.type = 'sine';
		
		// 4. Set pitch frequency (e.g., 440Hz is the musical note A4)
		oscillator.frequency.setValueAtTime(1500, audioCtx.currentTime);
		lfo.frequency.setValueAtTime(20, audioCtx.currentTime);
		lfo2.frequency.setValueAtTime(100, audioCtx.currentTime);
		
		const depth = audioCtx.createGain();
		depth.gain.value = 500;
		const depth2gain = audioCtx.createGain();
		const depth2depth = audioCtx.createGain();
		depth2depth.gain.value = 1.0;
		
		lfo.connect(depth);
		depth.connect(oscillator.frequency);
		
		lfo2.connect(depth2depth);
		depth2depth.connect(depth2gain.gain);
		
		oscillator.connect(depth2gain);
		
		// 5. Connect the generator to your speakers
		oscillator.connect(audioCtx.destination);
		
		// 6. Start playing and schedule it to stop after 1.5 seconds
		lfo.start();
		lfo2.start();
		oscillator.start();
		//oscillator.stop(audioCtx.currentTime + 5);
	}
